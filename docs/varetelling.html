<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varetelling – Garnhexene</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
                    /* --- Qty stepper fargede knapper --- */
                    .qty-stepper {
                        display: flex;
                        gap: 4px;
                        align-items: center;
                        margin-bottom: 8px;
                    }
                    .qty-stepper .qty-btn {
                        font-size: 16px;
                        font-family: 'DM Mono', monospace;
                        font-weight: 600;
                        border: none;
                        border-radius: 6px;
                        padding: 6px 10px;
                        cursor: pointer;
                        background: var(--surface-2);
                        color: var(--text);
                        transition: background 0.15s;
                    }
                    .qty-stepper .qty-btn.minus-multi {
                        background: #e17055;
                        color: #fff;
                    }
                    .qty-stepper .qty-btn.plus-multi {
                        background: #00b894;
                        color: #fff;
                    }
                    .qty-stepper .qty-btn.minus {
                        background: #636e72;
                        color: #fff;
                    }
                    .qty-stepper .qty-btn.plus {
                        background: #636e72;
                        color: #fff;
                    }
                    .qty-stepper .qty-btn:active {
                        filter: brightness(0.9);
                    }
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #242836;
            --border: #2e3347;
            --text: #e8eaed;
            --text-muted: #8b8fa3;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --success: #00b894;
            --success-bg: rgba(0, 184, 148, 0.12);
            --warning: #fdcb6e;
            --warning-bg: rgba(253, 203, 110, 0.12);
            --danger: #e17055;
            --danger-bg: rgba(225, 112, 85, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            color: var(--accent-light);
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 14px;
            margin-left: 8px;
        }
                .qty-stepper-multi {
                    display: flex;
                    gap: 10px;
                    margin-bottom: 12px;
                }
                .qty-stepper {
                    display: flex;
                    gap: 10px;
                    margin-bottom: 12px;
                }
                .qty-input-row {
                    display: flex;
                    flex-direction: column;
                    align-items: flex-start;
                }
                .qty-input-row label {
                    margin-bottom: 6px;
                    font-size: 1.1em;
                }
                .qty-stepper-multi button,
                .qty-stepper button {
                    min-width: 56px;
                    min-height: 48px;
                    font-size: 1.5em;
                    border-radius: 10px;
                    font-weight: 700;
                    border: none;
                    cursor: pointer;
                    transition: background 0.15s, color 0.15s;
                    box-shadow: 0 2px 8px #0002;
                }
                .qty-stepper-multi .qty-btn.minus-multi {
                    background: #2d2f3a;
                    color: #ff6b6b;
                }
                .qty-stepper-multi .qty-btn.plus-multi {
                    background: #2d2f3a;
                    color: #6bffb0;
                }
                .qty-stepper .qty-btn.minus {
                    background: #3a2230;
                    color: #ff6b6b;
                }
                .qty-stepper .qty-btn.plus {
                    background: #223a2d;
                    color: #6bffb0;
                }
                .qty-stepper-multi .qty-btn.minus-multi:hover,
                .qty-stepper .qty-btn.minus:hover {
                    background: #ff6b6b;
                    color: #fff;
                }
                .qty-stepper-multi .qty-btn.plus-multi:hover,
                .qty-stepper .qty-btn.plus:hover {
                    background: #6bffb0;
                    color: #222;
                }
                .qty-stepper input[type="number"] {
                    width: 70px;
                    height: 48px;
                    font-size: 1.3em;
                    text-align: center;
                    border-radius: 10px;
                    border: 1px solid #333;
                    background: #23242a;
                    color: #f3f3f3;
                }
                .qty-input-row > button.btn {
                    margin-top: 4px;
                    font-size: 1.1em;
                    padding: 10px 24px;
                }
        .badge {
            background: var(--accent);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: 'DM Mono', monospace;
        }

        /* Setup screen */
        .screen { display: none; }
        .screen.active { display: block; }

        .setup-container {
            max-width: 440px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .setup-container h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .setup-container p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .field {
            margin-bottom: 20px;
        }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .field input, .field select {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus, .field select:focus {
            border-color: var(--accent);
        }
        .field input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }
        .field .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: #5b4bd6; }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }
        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover { background: #00a382; }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        .btn-sm {
            padding: 10px 16px;
            font-size: 13px;
            width: auto;
        }

        /* Scanner screen */
        .scanner-layout {
            display: flex;
            flex-direction: column;
            height: calc(100dvh - 57px);
        }
        .scanner-area {
            position: relative;
            background: #000;
            flex: 0 0 auto;
            height: 280px;
            overflow: hidden;
        }
        .scanner-area #reader {
            width: 100%;
            height: 100%;
        }
        .scanner-area #reader video {
            object-fit: cover !important;
        }
        /* Hide the html5-qrcode default UI chrome */
        #reader__dashboard { display: none !important; }
        #reader__scan_region { height: 100% !important; }
        #reader__scan_region img { display: none !important; }

        .scanner-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }
        .scan-frame {
            width: 280px;
            height: 140px;
            border: 2px solid rgba(168, 155, 254, 0.6);
            border-radius: 12px;
            position: relative;
            margin-bottom: 48px;
        }
        .scan-frame::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 8px;
            right: 8px;
            height: 2px;
            background: var(--accent-light);
            animation: scanline 2s ease-in-out infinite;
        }
        @keyframes scanline {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .scanner-status {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 10;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Content below scanner */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Manual entry */
        .manual-entry {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .manual-entry input {
            flex: 1;
            padding: 12px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            outline: none;
        }
        .manual-entry input:focus { border-color: var(--accent); }

        /* Product card */
        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .product-card .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .product-card .already-counted-banner {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(250, 177, 60, 0.15);
            border: 1px solid rgba(250, 177, 60, 0.45);
            color: #fab13c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 14px;
        }
        .product-card .product-variant-name {
            font-size: 13px;
            color: var(--accent-light);
            font-weight: 500;
            margin-bottom: 4px;
        }
        .product-card .product-meta {
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            margin-bottom: 16px;
        }
        .product-card .stock-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .stock-label {
            font-size: 13px;
            color: var(--text-muted);
            min-width: 90px;
        }
        .stock-value {
            font-family: 'DM Mono', monospace;
            font-size: 15px;
            font-weight: 500;
        }

        .qty-input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .qty-input-row label {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        .qty-stepper {
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .qty-stepper button {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .qty-stepper button:hover { background: var(--border); }
        .qty-stepper input {
            width: 64px;
            height: 44px;
            border: none;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            outline: none;
            -moz-appearance: textfield;
        }
        .qty-stepper input::-webkit-inner-spin-button,
        .qty-stepper input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }
        .qty-input-row .btn {
            width: auto;
            flex-shrink: 0;
        }

        /* Counted list */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-top: 24px;
        }
        .counted-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
        }
        .counted-item .item-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }
        .counted-item .item-info {
            flex: 1;
            min-width: 0;
        }
        .counted-item .item-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .counted-item .item-variant {
            font-size: 12px;
            color: var(--accent-light);
            font-weight: 500;
            margin-top: 2px;
        }
        .counted-item .item-ean {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            margin-top: 2px;
        }
        .counted-item .item-bottom {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .counted-item .item-qty-change {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--text-muted);
        }
        .counted-item .item-qty {
            font-family: 'DM Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--success);
            flex-shrink: 0;
        }
        .counted-item .item-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .counted-item .item-edit-btn {
            margin-left: auto;
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 6px;
            background: var(--surface-2);
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .counted-item .item-edit-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .counted-item .item-delete-btn {
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 6px;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .counted-item .item-delete-btn:hover {
            background: var(--danger);
            color: #fff;
        }
        .status-saved {
            background: var(--success-bg);
            color: var(--success);
        }
        .status-pending {
            background: var(--warning-bg);
            color: var(--warning);
        }
        .status-error {
            background: var(--danger-bg);
            color: var(--danger);
        }

        /* Bottom bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        .bottom-bar .btn { flex: 1; }

        /* More-menu dropdown */
        .more-menu { position: relative; flex: 0 0 auto; }
        .more-trigger { width: auto; padding: 16px; font-size: 20px; line-height: 1; }
        .more-dropdown {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.35);
            min-width: 220px;
            z-index: 200;
            overflow: hidden;
        }
        .more-dropdown.open { display: block; }
        .more-dropdown button {
            display: block;
            width: 100%;
            background: none;
            border: none;
            color: var(--text);
            font-size: 15px;
            text-align: left;
            padding: 14px 18px;
            cursor: pointer;
        }
        .more-dropdown button:hover { background: var(--border); }
        .more-dropdown button + button { border-top: 1px solid var(--border); }

        /* Progress bar */
        .load-progress { margin-top: 20px; display: none; }
        .load-progress.visible { display: block; }
        .load-progress-label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; text-align: center; }
        .load-progress-track {
            width: 100%; height: 6px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }
        .load-progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 99px;
            transition: width 0.35s ease;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 72px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.4;
        }
        .empty-state p { font-size: 14px; }

        /* Loading spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive tweaks */
        @media (min-width: 600px) {
            .scanner-area { height: 340px; }
            .content-area { max-width: 560px; margin: 0 auto; }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- SETUP SCREEN -->
<div class="screen active" id="setupScreen">
    <div class="header">
        <h1>Varetelling <span>MyStore</span></h1>
    </div>
    <div class="setup-container" id="setupContainer">
        <!-- Fylles inn av JS -->
    </div>
</div>

<!-- SCANNER SCREEN -->
<div class="screen" id="scannerScreen">
    <div class="header">
        <h1>Varetelling <span>MyStore</span></h1>
        <span class="badge" id="countBadge">0 telt</span>
    </div>
    <div class="scanner-layout">
        <div class="scanner-area">
            <div id="reader"></div>
            <div class="scanner-overlay">
                <div class="scan-frame"></div>
            </div>
            <div class="scanner-status" id="scannerStatus">Klar til skanning...</div>
        </div>

        <div class="content-area">
            <!-- Manual EAN entry -->
            <div class="manual-entry">
                <input type="text" id="manualEan" placeholder="Tast inn EAN / strekkode..." inputmode="numeric">
                <button class="btn btn-primary btn-sm" onclick="manualLookup()">Søk</button>
            </div>

            <!-- Current product -->
            <div id="currentProduct"></div>

            <!-- Counted items -->
            <div id="countedSection"></div>
        </div>

        <div class="bottom-bar">
            <button class="btn btn-success" onclick="saveAllToMyStore()">
                Lagre alle til MyStore
            </button>
            <div class="more-menu" id="moreMenu">
                <button class="btn btn-secondary more-trigger" onclick="toggleMoreMenu(event)" style="flex: 0 0 auto; width: auto; padding: 16px; font-size: 20px; line-height:1;">
                    ⋮
                </button>
                <div class="more-dropdown" id="moreDropdown">
                    <button onclick="exportCSV(); closeMoreMenu()">📥 Eksporter CSV</button>
                    <button onclick="showDebugLog(); closeMoreMenu()">🐛 Feilsøkingslogg</button>
                    <button onclick="logoutAndReset(); closeMoreMenu()">
                        🔒 Nullstill innstillinger
                        <span style="display:block; font-size:11px; color:var(--text-muted); margin-top:2px; font-weight:normal;">Sletter API-nøkkel og PIN fra denne enheten</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────
let config = { shopName: '', apiKey: '' };
let productCache = {};      // EAN → { id, variantId, name, ean, sku, quantity, productId }
let countedItems = [];       // { variantId, productId, name, ean, sku, oldQty, newQty, status }
let html5QrCode = null;
let isScanning = false;
let lastScannedCode = '';

let debugLog = [];  // For å lagre siste loggmeldinger

function addDebugLog(message) {
    debugLog.push(new Date().toLocaleTimeString() + ': ' + message);
    if (debugLog.length > 10) debugLog.shift();  // Behold kun siste 10
}

function setProgress(pct, label) {
    const bar  = document.getElementById('loadProgressBar');
    const lbl  = document.getElementById('loadProgressLabel');
    const wrap = document.getElementById('loadProgress');
    if (!bar) return;
    if (pct === null) { wrap.classList.remove('visible'); return; }
    wrap.classList.add('visible');
    bar.style.width = pct + '%';
    if (label) lbl.textContent = label;
}

// ─── KRYPTO (AES-256-GCM + PBKDF2) ──────────────────
const STORAGE_KEY = 'ms_enc_v1';

async function deriveKey(pin, salt) {
    const keyMaterial = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(pin), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
    );
}

async function encryptCredentials(shopName, apiKey, pin) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv   = crypto.getRandomValues(new Uint8Array(12));
    const key  = await deriveKey(pin, salt);
    const data = new TextEncoder().encode(JSON.stringify({ shopName, apiKey }));
    const enc  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
    const combined = new Uint8Array(16 + 12 + enc.byteLength);
    combined.set(salt, 0); combined.set(iv, 16); combined.set(new Uint8Array(enc), 28);
    return btoa(String.fromCharCode(...combined));
}

async function decryptCredentials(stored, pin) {
    const combined = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
    const salt = combined.slice(0, 16);
    const iv   = combined.slice(16, 28);
    const ct   = combined.slice(28);
    const key  = await deriveKey(pin, salt);
    const dec  = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return JSON.parse(new TextDecoder().decode(dec));
}

async function setupAndConnect() {
    const shopName   = document.getElementById('shopName').value.trim();
    const apiKey     = document.getElementById('apiKey').value.trim();
    const pin        = document.getElementById('pinNew').value;
    const pinConfirm = document.getElementById('pinConfirm').value;

    if (!shopName || !apiKey) { showToast('Fyll inn butikknavn og API-nøkkel', 'error'); return; }
    if (pin.length < 4)       { showToast('PIN må være minst 4 tegn', 'error'); return; }
    if (pin !== pinConfirm)   { showToast('PIN-kodene stemmer ikke overens', 'error'); return; }

    const btn = document.getElementById('connectBtn');
    btn.innerHTML = '<span class="spinner"></span> Lagrer og kobler til...';
    btn.disabled = true;

    config.shopName = shopName.replace(/^https?:\/\//, '').replace(/\.mystore.*$/, '').replace(/\/$/, '');
    config.apiKey   = apiKey;

    try {
        const data = await apiFetch('/products?page[size]=1&page[number]=1');
        if (!data.data) throw new Error('Feil respons fra API');

        const encrypted = await encryptCredentials(config.shopName, config.apiKey, pin);
        localStorage.setItem(STORAGE_KEY, encrypted);
        addDebugLog('Innstillinger kryptert og lagret');

        showToast('Tilkoblet! Laster produkter...', 'success');
        await cacheAllVariants();
        goToScanner();
    } catch (err) {
        addDebugLog('Tilkobling feilet: ' + err.message);
        showToast('Kunne ikke koble til: ' + err.message, 'error');
        btn.innerHTML = 'Lagre og koble til';
        btn.disabled = false;
    }
}

async function unlockWithPin() {
    const pin    = document.getElementById('pinInput').value;
    const stored = localStorage.getItem(STORAGE_KEY);
    if (!pin || !stored) return;

    const btn = document.getElementById('connectBtn');
    btn.innerHTML = '<span class="spinner"></span> Kobler til...';
    btn.disabled = true;

    try {
        setProgress(10, 'Dekrypterer...');
        const creds = await decryptCredentials(stored, pin);
        config.shopName = creds.shopName;
        config.apiKey   = creds.apiKey;

        showToast('Tilkoblet! Laster produkter...', 'success');
        await cacheAllVariants(setProgress);
        setProgress(null);
        goToScanner();
    } catch (err) {
        const isCryptoErr = err.name === 'OperationError';
        showToast(isCryptoErr ? 'Feil PIN-kode' : ('Feil: ' + err.message), 'error');
        btn.innerHTML = 'Lås opp';
        btn.disabled = false;
        if (isCryptoErr) document.getElementById('pinInput').value = '';
    }
}

function goToScanner() {
    document.getElementById('setupScreen').classList.remove('active');
    document.getElementById('scannerScreen').classList.add('active');
    startScanner();
}

function logoutAndReset() {
    showConfirm(
        'Slett lagrede innstillinger?',
        'API-nøkkelen fjernes fra denne enheten. Du må taste den inn på nytt.',
        () => {
            localStorage.removeItem(STORAGE_KEY);
            config = { shopName: '', apiKey: '' };
            productCache = {};
            countedItems = [];
            if (isScanning && html5QrCode) {
                html5QrCode.stop().catch(() => {});
                isScanning = false;
            }
            document.getElementById('scannerScreen').classList.remove('active');
            document.getElementById('setupScreen').classList.add('active');
            renderSetupScreen();
        }
    );
}

// ─── API HELPERS ─────────────────────────────────────
function apiBase() {
    return `https://api.mystore.no/shops/${config.shopName}`;
}

async function apiFetch(path, options = {}, _retry = 0) {
    const url = apiBase() + path;
    const headers = {
        'Authorization': `Bearer ${config.apiKey}`,
        'Accept': 'application/vnd.api+json',
        ...(options.headers || {})
    };

    const r = await fetch(url, { ...options, headers });
    const text = await r.text();

    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch { data = text; }

    if (r.status === 429 && _retry < 5) {
        const wait = (2 ** _retry) * 1000; // 1s, 2s, 4s, 8s, 16s
        addDebugLog(`429 rate limit – venter ${wait / 1000}s (forsøk ${_retry + 1})`);
        await new Promise(res => setTimeout(res, wait));
        return apiFetch(path, options, _retry + 1);
    }

    if (!r.ok) {
        console.error('API error', { url, status: r.status, response: data });
        throw new Error(`HTTP ${r.status}: ${typeof data === 'string' ? data : JSON.stringify(data)}`);
    }

    return data;
}

// Hjelpefunksjon: hent alle sider for et endepunkt parallelt
async function fetchAllPages(path, maxPages = 50) {
    const sep = path.includes('?') ? '&' : '?';
    const firstData = await apiFetch(`${path}${sep}page[number]=1`);
    const allItems = [...(firstData.data || [])];

    // Finn siste sidenummer fra links.last
    let lastPage = 1;
    if (firstData.links?.last) {
        const m = firstData.links.last.match(/page\[number\]=(\d+)/);
        if (m) lastPage = Math.min(parseInt(m[1]), maxPages);
    } else if (firstData.links?.next) {
        // Ingen last-link – fall tilbake til sekvensiell
        let hasMore = true;
        let page = 2;
        while (hasMore && page <= maxPages) {
            const d = await apiFetch(`${path}${sep}page[number]=${page}`);
            allItems.push(...(d.data || []));
            hasMore = !!d.links?.next;
            page++;
        }
        return allItems;
    }

    if (lastPage > 1) {
        const pagePromises = [];
        for (let p = 2; p <= lastPage; p++) {
            pagePromises.push(apiFetch(`${path}${sep}page[number]=${p}`));
        }
        const results = await Promise.all(pagePromises);
        for (const r of results) allItems.push(...(r.data || []));
    }
    return allItems;
}

async function cacheAllVariants(onProgress = null) {
    const prog = async (pct, lbl) => {
        if (onProgress) onProgress(pct, lbl);
        await new Promise(r => requestAnimationFrame(r)); // la nettleseren tegne om
    };
    updateScannerStatus('Laster data parallelt...');
    await prog(20, 'Laster produkter og attributter...');

    // Last produkter, opsjonsverdier og produktattributter samtidig
    const [products, optionValues, productAttrs] = await Promise.all([
        fetchAllPages('/products?page[size]=250&fields[products]=name,sku,ean'),
        fetchAllPages('/product-option-values?page[size]=250'),
        fetchAllPages('/product-attributes?page[size]=250')
    ]);

    addDebugLog(`Lastet parallelt: ${products.length} produkter, ${optionValues.length} opsjonsverdier, ${productAttrs.length} produktattributter`);
    await prog(55, 'Laster varianter...');

    // Bygg produktnavn-kart
    const productNames = {};
    const allProductEANs = [];
    for (const p of products) {
        const name = p.attributes.name?.no || p.attributes.name?.en || '';
        productNames[p.id] = name;
        if (p.attributes.ean) {
            productCache[p.attributes.ean] = {
                productId: p.id, variantId: null, name, variantName: '',
                ean: p.attributes.ean, sku: '', quantity: 0
            };
            allProductEANs.push(p.attributes.ean);
        }
    }

    // Bygg opsjonverdi-kart: id → visningsnavn
    const optionValueNames = {};
    for (const ov of optionValues) {
        const n = ov.attributes?.name;
        optionValueNames[ov.id] = (n && typeof n === 'object')
            ? (n.no || n.en || Object.values(n)[0] || '') : (n || '');
    }
    if (optionValues.length > 0) addDebugLog('Eksempel opsjonverdi: ' + JSON.stringify(optionValues[0]));

    // Bygg produktattributt-kart: pa-id → opsjonverdi-id
    const paToOptionValueId = {};
    for (const pa of productAttrs) {
        const ovId = pa.relationships?.['product-option-value']?.data?.id;
        if (ovId) paToOptionValueId[pa.id] = ovId;
    }
    if (productAttrs.length > 0) addDebugLog('Eksempel produktattributt: ' + JSON.stringify(productAttrs[0]));
    addDebugLog(`${Object.keys(paToOptionValueId).length} produktattributter med opsjonverdi-kobling`);

    // Last varianter (avhenger av de tre over)
    updateScannerStatus('Laster varianter...');
    const variants = await fetchAllPages('/product-variants?page[size]=250');
    addDebugLog(`Lastet ${variants.length} varianter`);
    await prog(80, 'Bygger produktkart...');
    if (variants.length > 0) addDebugLog('Eksempel variant-objekt: ' + JSON.stringify(variants[0]));

    let variantCount = 0;
    let firstNamedLogged = false;
    for (const v of variants) {
        const attr = v.attributes;
        const productId = v.relationships?.product?.data?.id;
        const name = productNames[productId] || 'Ukjent produkt';

        const paIds = (v.relationships?.['product-attributes']?.data || []).map(d => d.id);
        const vNameParts = paIds
            .map(paId => { const ovId = paToOptionValueId[paId]; return ovId ? (optionValueNames[ovId] || '') : ''; })
            .filter(Boolean);
        const vName = vNameParts.join(' / ');
        if (!firstNamedLogged && vName) {
            addDebugLog(`Første variant med navn: id=${v.id}, vName="${vName}"`);
            firstNamedLogged = true;
        }

        const entry = {
            productId, variantId: v.id, name, variantName: vName,
            ean: attr.ean || '', sku: attr.sku || '',
            quantity: parseInt(attr.quantity) || 0
        };
        if (attr.ean) productCache[attr.ean] = entry;
        productCache['vid:' + v.id] = entry;
        variantCount++;
    }

    await prog(100, 'Ferdig!');
    showToast(`${products.length} produkter, ${variantCount} varianter lastet`, 'success');
    addDebugLog(`Ferdig: ${products.length} produkter, ${variantCount} varianter`);
}


async function updateVariantStock(variantId, quantity) {
    return apiFetch(`/product-variants/${variantId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/vnd.api+json' },
        body: JSON.stringify({
            data: {
                type: 'product-variants',
                id: String(variantId),
                attributes: {
                    quantity: quantity
                }
            }
        })
    });
}

async function updateProductStock(productId, quantity) {
    return apiFetch(`/products/${productId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/vnd.api+json' },
        body: JSON.stringify({
            data: {
                type: 'products',
                id: String(productId),
                attributes: {
                    quantity: quantity
                }
            }
        })
    });
}
// ─── SCANNER ─────────────────────────────────────────
function startScanner() {
    html5QrCode = new Html5Qrcode("reader");

    const scanConfig = {
        fps: 20,
        qrbox: (viewfinderWidth, viewfinderHeight) => {
            const w = Math.round(Math.min(viewfinderWidth * 0.85, 320));
            return { width: w, height: Math.round(w * 0.45) };
        },
        aspectRatio: 1.5,
        formatsToSupport: [
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODE_93,
            Html5QrcodeSupportedFormats.CODABAR,
        ]
    };

    html5QrCode.start(
        { facingMode: "environment" },
        scanConfig,
        onScanSuccess,
        (errorMessage) => {
            // Logg feil for debugging
            console.log('Skanningsfeil:', errorMessage);
        }
    ).then(() => {
        isScanning = true;
        updateScannerStatus('Skann en strekkode...');
    }).catch(err => {
        console.error('Kamera-feil:', err);
        updateScannerStatus('Kamera ikke tilgjengelig – bruk manuelt felt. Feil: ' + err.message);
    });
}

function onScanSuccess(decodedText) {
    const now = Date.now();
    if (decodedText === lastScannedCode && (now - lastScanTime) < 3000) return;
    lastScannedCode = decodedText;
    lastScanTime = now;

    if (navigator.vibrate) navigator.vibrate(100);

    lookupProduct(decodedText);
}

function manualLookup() {
    const ean = document.getElementById('manualEan').value.trim();
    if (!ean) return;
    document.getElementById('manualEan').value = '';
    lookupProduct(ean);
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('manualEan')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') manualLookup();
    });
    renderSetupScreen();
});

async function lookupProduct(code) {
    updateScannerStatus('Søker: ' + code);

    // Check cache: direct EAN
    const product = productCache[code];
    if (product) {
        addDebugLog('Funnet i cache: ' + JSON.stringify(product));
        showProductCard(product, code);
    } else {
        addDebugLog('Ikke i cache, søker API for varianter...');
        // Fallback: search API by EAN filter on variants
        try {
            const data = await apiFetch(`/product-variants?filter[ean][path]=ean&filter[ean][value]=${encodeURIComponent(code)}&page[size]=1`);
            if (data.data && data.data.length > 0) {
                const v = data.data[0];
                const productId = v.relationships?.product?.data?.id;
                // Fetch product name
                const pData = await apiFetch(`/products/${productId}?fields[products]=name`);
                const name = pData.data?.attributes?.name?.no || 'Ukjent';
                const entry = {
                    productId: productId,
                    variantId: v.id,
                    name: name,
                    variantName: '',
                    ean: v.attributes.ean || '',
                    sku: v.attributes.sku || '',
                    quantity: parseInt(v.attributes.quantity) || 0
                };
                if (entry.ean) productCache[entry.ean] = entry;
                addDebugLog('Funnet i varianter: ' + JSON.stringify(entry));
                showProductCard(entry, code);
            } else {
                addDebugLog('Ikke funnet i varianter, søker alle varianter...');
                // Fallback: søk på alle varianter for EAN
                try {
                    let allVariants = [];
                    let varPage = 1;
                    let varHasMore = true;
                    const startTime = Date.now();
                    while (varHasMore && varPage <= 20) {  // Maks 20 sider, 250*20=5000
                        if (Date.now() - startTime > 10000) {
                            addDebugLog('Variantsøk avbrutt: tok for lang tid (>10 sek)');
                            showToast('Søk på alle varianter tok for lang tid og ble avbrutt.', 'error');
                            updateScannerStatus('Avbrutt – prøv igjen');
                            return;
                        }
                        addDebugLog('Henter variant-side ' + varPage);
                        const data = await apiFetch(`/product-variants?page[size]=250&page[number]=${varPage}`);
                        const variants = data.data || [];
                        allVariants = allVariants.concat(variants);
                        varHasMore = variants.length === 250;
                        varPage++;
                    }
                    addDebugLog('Totalt hentet varianter: ' + allVariants.length);
                    const found = allVariants.find(v => v.attributes.ean === code);
                    if (found) {
                        const productId = found.relationships?.product?.data?.id;
                        let name = 'Ukjent';
                        try {
                            const pData = await apiFetch(`/products/${productId}?fields[products]=name`);
                            name = pData.data?.attributes?.name?.no || pData.data?.attributes?.name?.en || 'Ukjent';
                        } catch (err) {
                            addDebugLog('Kunne ikke hente produktnavn: ' + err.message);
                        }
                        const entry = {
                            productId: productId,
                            variantId: found.id,
                            name: name,
                            variantName: '',
                            ean: found.attributes.ean || '',
                            sku: found.attributes.sku || '',
                            quantity: parseInt(found.attributes.quantity) || 0
                        };
                        if (entry.ean) productCache[entry.ean] = entry;
                        addDebugLog('Funnet i alle varianter: ' + JSON.stringify(entry));
                        showProductCard(entry, code);
                    } else {
                        const eans = allVariants.filter(v => v.attributes.ean).map(v => v.attributes.ean);
                        addDebugLog('Ikke funnet i alle varianter heller. Tilgjengelige EAN (' + eans.length + '): ' + eans.slice(0,10).join(', ') + (eans.length > 10 ? ', ...' : ''));
                        showToast('Produkt ikke funnet: ' + code, 'error');
                        updateScannerStatus('Ikke funnet – prøv igjen');
                    }
                } catch (err) {
                    addDebugLog('Feil ved søk på alle varianter: ' + err.message);
                    showToast('Feil ved oppslag', 'error');
                    updateScannerStatus('Feil – prøv igjen');
                }
            }
        } catch (err) {
            addDebugLog('Feil ved søk på varianter: ' + err.message);
            showToast('Feil ved oppslag', 'error');
            updateScannerStatus('Feil – prøv igjen');
        }
    }
}

function showProductCard(product, scannedCode) {
    updateScannerStatus('Funnet!');
    const itemId = product.variantId || product.productId;
    const existing = countedItems.find(i => (i.variantId || i.productId) === itemId);
    const currentQty = existing ? existing.newQty : product.quantity;

    const html = `
        <div class="product-card">
            ${existing ? `
            <div class="already-counted-banner">
                ⚠️ Allerede telt – tidligere antall: <strong>${existing.newQty}</strong>
            </div>` : ''}
            <div class="product-name">${escHtml(product.name)}</div>
            ${product.variantName ? `<div class="product-variant-name">${escHtml(product.variantName)}</div>` : ''}
            <div class="product-meta">
                ${product.ean ? 'EAN: ' + escHtml(product.ean) + ' · ' : ''}
                ${product.variantId ? 'Variant: ' + product.variantId + ' · ' : ''}
                Produkt: ${product.productId}
            </div>
            <div class="stock-row">
                <span class="stock-label">Nåværende lager:</span>
                <span class="stock-value">${product.quantity}</span>
            </div>
            <div class="qty-input-row">
                <label>Telt antall:</label>
                <div class="qty-stepper-multi">
                    <button class="qty-btn minus-multi" onclick="stepQty(-20)">−20</button>
                    <button class="qty-btn minus-multi" onclick="stepQty(-10)">−10</button>
                    <button class="qty-btn plus-multi" onclick="stepQty(10)">+10</button>
                    <button class="qty-btn plus-multi" onclick="stepQty(20)">+20</button>
                </div>
                <div class="qty-stepper">
                    <button class="qty-btn minus" onclick="stepQty(-1)">−</button>
                    <input type="number" id="qtyInput" value="${existing ? currentQty : ''}" min="0" placeholder="0" inputmode="numeric">
                    <button class="qty-btn plus" onclick="stepQty(1)">+</button>
                </div>
                <button class="btn btn-primary btn-sm" onclick="registerCount('${product.variantId || ''}', '${product.productId}', '${escAttr(product.name)}', '${escAttr(scannedCode)}', ${product.quantity}, '${escAttr(product.variantName || '')}')">
                    ${existing ? 'Oppdater' : 'Registrer'}
                </button>
            </div>
        </div>
    `;
    document.getElementById('currentProduct').innerHTML = html;

    setTimeout(() => {
        const inp = document.getElementById('qtyInput');
        if (inp) inp.focus();
    }, 100);
}

function stepQty(delta) {
    const inp = document.getElementById('qtyInput');
    if (!inp) return;
    let val = parseInt(inp.value) || 0;
    val = Math.max(0, val + delta);
    inp.value = val;
}

function registerCount(variantId, productId, name, ean, oldQty, variantName) {
    const inp = document.getElementById('qtyInput');
    const newQty = parseInt(inp?.value);
    if (isNaN(newQty) || newQty < 0) {
        showToast('Ugyldig antall', 'error');
        return;
    }

    const itemId = variantId || productId;
    const existing = countedItems.find(i => (i.variantId || i.productId) === itemId);
    if (existing) {
        existing.newQty = newQty;
        existing.status = 'pending';
        if (variantName) existing.variantName = variantName;
    } else {
        countedItems.push({ variantId, productId, name, variantName: variantName || '', ean, sku: '', oldQty, newQty, status: 'pending' });
    }

    document.getElementById('currentProduct').innerHTML = '';
    updateCountedList();
    updateBadge();
    showToast(`${name}: ${newQty} stk registrert`, 'success');
    updateScannerStatus('Skann neste vare...');
}

// ─── COUNTED LIST ────────────────────────────────────
function updateCountedList() {
    if (countedItems.length === 0) {
        document.getElementById('countedSection').innerHTML = '';
        return;
    }

    let html = '<div class="section-title">Telte varer (' + countedItems.length + ')</div>';
    for (let i = countedItems.length - 1; i >= 0; i--) {
        const item = countedItems[i];
        const diff = item.newQty - item.oldQty;
        const diffStr = diff > 0 ? `+${diff}` : String(diff);
        const statusClass = item.status === 'saved' ? 'status-saved' : item.status === 'error' ? 'status-error' : 'status-pending';
        const statusText = item.status === 'saved' ? 'Lagret' : item.status === 'error' ? 'Feil' : 'Venter';

        const productName = item.name || '';
        const variantName = item.variantName || '';

        html += `
            <div class="counted-item">
                <div class="item-top">
                    <div class="item-info">
                        <div class="item-name">${escHtml(productName)}</div>
                        ${variantName ? `<div class="item-variant">${escHtml(variantName)}</div>` : ''}
                        <div class="item-ean">${item.ean ? 'EAN: ' + escHtml(item.ean) : ''}${item.variantId ? ' · Variant: ' + item.variantId : ''}</div>
                    </div>
                    <span class="item-qty">${item.newQty}</span>
                </div>
                <div class="item-bottom">
                    <span class="item-qty-change">${item.oldQty} → ${item.newQty} <span style="color:${diff >= 0 ? 'var(--success)' : 'var(--danger)'};font-weight:600;">(${diffStr})</span></span>
                    <span class="item-status ${statusClass}">${statusText}</span>
                    <button class="item-edit-btn" onclick="editCountedItem('${item.variantId || ''}', '${item.productId}')">Endre</button>
                    <button class="item-delete-btn" onclick="deleteCountedItem('${item.variantId || ''}', '${item.productId}')">Slett</button>
                </div>
            </div>
        `;
    }
    document.getElementById('countedSection').innerHTML = html;
}

// Slett en telt vare fra listen
function deleteCountedItem(variantId, productId) {
    const idx = countedItems.findIndex(i =>
        (i.variantId === variantId || (!i.variantId && variantId === '')) && i.productId === productId
    );
    if (idx === -1) return;
    const item = countedItems[idx];
    const label = [item.name, item.variantName].filter(Boolean).join(' – ');

    showConfirm(`Slett «${label}»?`, 'Varen fjernes fra tellelisten.', () => {
        countedItems.splice(idx, 1);
        updateCountedList();
        updateBadge();
    });
}

function showConfirm(title, message, onConfirm) {
    let modal = document.getElementById('confirmModal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'confirmModal';
        modal.style.cssText = `
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.75);
            display: flex; align-items: center; justify-content: center;
            padding: 16px; box-sizing: border-box;
        `;
        modal.innerHTML = `
            <div style="
                background: var(--surface-1, #1e1e2e); color: var(--text, #cdd6f4);
                border-radius: 14px; width: 100%; max-width: 360px;
                padding: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            ">
                <div id="confirmTitle" style="font-size:17px; font-weight:700; margin-bottom:8px;"></div>
                <div id="confirmMessage" style="font-size:14px; color: var(--text-muted, #aaa); margin-bottom:24px;"></div>
                <div style="display:flex; gap:10px; justify-content:flex-end;">
                    <button id="confirmCancel" style="
                        padding: 10px 20px; border-radius: 8px; font-size:14px; font-weight:600;
                        background: var(--surface-2, #313244); color: var(--text, #cdd6f4);
                        border: none; cursor: pointer;">Avbryt</button>
                    <button id="confirmOk" style="
                        padding: 10px 20px; border-radius: 8px; font-size:14px; font-weight:600;
                        background: var(--danger, #e17055); color: #fff;
                        border: none; cursor: pointer;">Slett</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMessage').textContent = message;
    modal.style.display = 'flex';

    const hide = () => { modal.style.display = 'none'; };
    document.getElementById('confirmCancel').onclick = hide;
    document.getElementById('confirmOk').onclick = () => { hide(); onConfirm(); };
    modal.onclick = e => { if (e.target === modal) hide(); };
}

// Gjør det mulig å endre antall på nytt fra telt-listen
function editCountedItem(variantId, productId) {
    // Finn riktig item fra countedItems
    const item = countedItems.find(i => (i.variantId === variantId || (!i.variantId && variantId === '')) && i.productId === productId);
    if (!item) return;
    // Vis produktkortet med forrige antall forhåndsutfylt
    let product = {
        name: item.name,
        variantName: item.variantName || '',
        ean: item.ean,
        variantId: item.variantId,
        productId: item.productId,
        quantity: item.oldQty !== undefined ? item.oldQty : '',
    };
    showProductCard(product, item.ean || '');
    // Sett inputfeltet til forrige telt antall
    setTimeout(() => {
        const input = document.getElementById('qtyInput');
        if (input) input.value = item.newQty;
    }, 50);
}

function updateBadge() {
    document.getElementById('countBadge').textContent = countedItems.length + ' telt';
}


// ─── SAVE TO MYSTORE ─────────────────────────────────
async function saveAllToMyStore() {
    const pending = countedItems.filter(i => i.status !== 'saved');
    if (pending.length === 0) {
        showToast('Ingen ventende varer å lagre', 'error');
        return;
    }

    for (const item of pending) {
        try {
            if (!item.variantId) {
                // For produkter uten varianter, oppdater produktet direkte
                await updateProductStock(item.productId, item.newQty);
                item.status = 'saved';
            } else {
                // For varianter, oppdater varianten
                await updateVariantStock(item.variantId, item.newQty);
                item.status = 'saved';
            }
        } catch (e) {
            item.status = 'error';
            console.error('Lagring feilet for vare:', item, e);
            showToast(`Feil ved lagring: ${e.message}`, 'error');
        }
    }

    updateCountedList();
}

// ─── EXPORT CSV ──────────────────────────────────────
function exportCSV() {
    if (countedItems.length === 0) {
        showToast('Ingen varer å eksportere', 'error');
        return;
    }
    const header = 'VariantID;ProduktID;Navn;EAN;Gammelt antall;Nytt antall;Differanse;Status\n';
    const rows = countedItems.map(i => {
        const diff = i.newQty - i.oldQty;
        return `${i.variantId};${i.productId};"${i.name}";${i.ean};${i.oldQty};${i.newQty};${diff};${i.status}`;
    }).join('\n');

    const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `varetelling_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV eksportert', 'success');
}

// ─── HELPERS ─────────────────────────────────────────
function escHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
}
function escAttr(str) {
    return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function addDebugLog(message) {
    debugLog.push(new Date().toLocaleTimeString() + ': ' + message);
    if (debugLog.length > 10) debugLog.shift();  // Behold kun siste 10
}

function showDebugLog() {
    let modal = document.getElementById('debugModal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'debugModal';
        modal.style.cssText = `
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.75);
            display: flex; align-items: center; justify-content: center;
            padding: 16px; box-sizing: border-box;
        `;
        modal.innerHTML = `
            <div style="
                background: #1e1e2e; color: #cdd6f4;
                border-radius: 12px; width: 100%; max-width: 700px;
                height: 80vh; display: flex; flex-direction: column;
                box-shadow: 0 8px 40px rgba(0,0,0,0.6);
                font-family: monospace;
            ">
                <div style="display:flex; justify-content:space-between; align-items:center;
                            padding: 14px 18px; border-bottom: 1px solid #313244; flex-shrink:0;">
                    <span style="font-size:15px; font-weight:600; font-family:sans-serif;">Debug-logg</span>
                    <button onclick="document.getElementById('debugModal').style.display='none'"
                        style="background:none; border:none; color:#f38ba8; font-size:22px;
                               cursor:pointer; line-height:1;">&#x2715;</button>
                </div>
                <pre id="debugLogContent" style="
                    flex: 1; overflow-y: auto; margin: 0;
                    padding: 14px 18px; font-size: 12px; line-height: 1.6;
                    white-space: pre-wrap; word-break: break-all;
                    color: #a6e3a1;
                "></pre>
                <div style="padding: 10px 18px; border-top: 1px solid #313244; flex-shrink:0; display:flex; gap:8px;">
                    <button onclick="navigator.clipboard.writeText(document.getElementById('debugLogContent').textContent)"
                        style="background:#313244; color:#cdd6f4; border:none; border-radius:6px;
                               padding:8px 14px; cursor:pointer; font-size:13px;">Kopier</button>
                    <button onclick="debugLog=[]; document.getElementById('debugLogContent').textContent='(tømt)';"
                        style="background:#313244; color:#f38ba8; border:none; border-radius:6px;
                               padding:8px 14px; cursor:pointer; font-size:13px;">Tøm</button>
                </div>
            </div>
        `;
        modal.addEventListener('click', e => {
            if (e.target === modal) modal.style.display = 'none';
        });
        document.body.appendChild(modal);
    }
    document.getElementById('debugLogContent').textContent = debugLog.join('\n') || '(ingen logger ennå)';
    modal.style.display = 'flex';
}

function updateScannerStatus(text) {
    const el = document.getElementById('scannerStatus');
    if (el) {
        if (text.includes('Laster')) {
            el.innerHTML = '<span class="spinner"></span> ' + text;
        } else {
            el.textContent = text;
        }
    }
}

function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.className = 'toast', 2500);
}
</script>
